      h2,

      input,
      body {
        font-family: "Poppins", sans-serif !important;
      }
    </style>
    <template id="single-spa-layout">
      <single-spa-router>
        <nav class="topnav" path="shared">
          <application name="navbar"></application>
        </nav>
        <route path="ams">
          <application name="ams-prefiler"></application>
        </route>
      </single-spa-router>

  <body>
    <script>
      Promise.all([
        System.import("single-spa"),
        System.import("single-spa-layout"),
      ]).then(([singleSpa, singleSpaLayout]) => {
        const {
          constructApplications,
          constructLayoutEngine,
          constructRoutes,
        } = singleSpaLayout;
        const { registerApplication, start } = singleSpa;

        const routes = constructRoutes(
          document.querySelector("#single-spa-layout"),
        );
        const applications = constructApplications({
          routes,
          loadApp({ name }) {
            return System.import(name);
          },
        });
        const layoutEngine = constructLayoutEngine({ routes, applications });
        applications.forEach(registerApplication);

        start();
      });
    </script>
